<!--
  OnlyPaws
  File: html/app/post.html

  CSS:
  /css/styles.css
  /css/pages/app-post.css

  JS:
  /js/paths.js
  /js/onlypawsClient.js
  /js/nav.js
  /js/partials.js
-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OnlyPaws — Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/pages/app-post.css" />
</head>

<body>
  <div class="pageShell">
    <div class="wrap">
      <div id="header-placeholder"></div>

      <div class="panel">
        <div class="pill">Post</div>
        <h1 id="pageTitle">Post</h1>

        <div class="meta postMetaRow">
          <b id="author">@creator</b>
          <span id="createdAt"></span>
        </div>

        <div class="mediaWrap postMediaBox" id="mediaBox" hidden></div>

        <div class="captionBox" id="caption" hidden></div>

        <div class="btnRow">
          <button class="ghost" id="likeBtn" data-liked="false" type="button" title="Like or unlike">
            <span id="likeIcon">♡</span>
            <span class="likeBtnLabel">Like</span>
            <span id="likeCount" class="likeCount">0</span>
          </button>

          <button class="ghost" id="copyLinkBtn" type="button">Copy link</button>

          <a class="ghost" id="backBtn" href="/html/app/feed.html">Back</a>
        </div>

        <div class="hint" id="hintBox">Loading…</div>
        <div class="err" id="errBox" hidden></div>
      </div>

      <div class="footerWrap" id="footer-placeholder"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/paths.js"></script>
  <script src="/js/onlypawsClient.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/partials.js"></script>

  <script>
    function goIndex() {
      window.location.replace(OP_PATHS.marketing.index);
    }

    function $(id) {
      return document.getElementById(id);
    }

    function show(el, yes) {
      if (!el) return;
      el.hidden = !yes;
    }

    function esc(s) {
      return (s ?? "").toString()
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function fmtDate(iso) {
      if (!iso) return "";
      const d = new Date(iso);
      try {
        return d.toLocaleString("it-IT", {
          year: "numeric",
          month: "short",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      } catch (e) {
        return d.toISOString();
      }
    }

    function getPostId() {
      const p = new URLSearchParams(window.location.search);
      return (p.get("id") || "").trim();
    }

    function getClient() {
      if (window.onlypawsClient) return window.onlypawsClient;
      throw new Error("Missing onlypawsClient. Ensure onlypawsClient.js is loaded and sets window.onlypawsClient.");
    }

    async function hydrateUserPill(client) {
      try {
        const pill = $("userPill");
        if (!pill) return;

        const { data: sessData } = await client.auth.getSession();
        const session = sessData?.session;

        if (!session) {
          pill.textContent = "Guest";
          return;
        }

        const uid = session.user.id;
        const email = session.user.email || "";

        const { data: prof } = await client
          .from("profiles")
          .select("username, display_name, role")
          .eq("user_id", uid)
          .maybeSingle();

        const uname = (prof?.username || "").trim();
        const dname = (prof?.display_name || "").trim();

        if (uname) pill.textContent = "@" + uname;
        else if (dname) pill.textContent = dname;
        else if (email) pill.textContent = email.split("@")[0];
        else pill.textContent = "User";
      } catch (e) {}
    }

    async function hydrateNav(client) {
      const profileBtn = $("navProfile");
      const fanDash = $("navFanDash");
      const creatorDash = $("navCreatorDash");
      const logoutBtn = $("navLogout");

      if (profileBtn) profileBtn.style.display = "inline-flex";
      if (logoutBtn) logoutBtn.style.display = "inline-flex";
      if (fanDash) fanDash.style.display = "none";
      if (creatorDash) creatorDash.style.display = "none";

      try {
        const { data: u } = await client.auth.getUser();
        const userId = u?.user?.id;
        if (!userId) return;

        const { data: p } = await client
          .from("profiles")
          .select("role")
          .eq("user_id", userId)
          .maybeSingle();

        if (p?.role === "creator") {
          if (creatorDash) creatorDash.href = OP_PATHS.creators.creatorDash;
          if (creatorDash) creatorDash.style.display = "inline-flex";
        } else {
          if (fanDash) fanDash.href = OP_PATHS.fans.fanDash;
          if (fanDash) fanDash.style.display = "inline-flex";
        }

        if (profileBtn) profileBtn.href = OP_PATHS.app.profile;
      } catch (e) {}
    }

    function setupLogout(client) {
      const logoutBtn = $("navLogout");
      if (!logoutBtn) return;
      if (logoutBtn.dataset.bound === "1") return;

      logoutBtn.dataset.bound = "1";
      logoutBtn.addEventListener("click", async (ev) => {
        ev.preventDefault();
        logoutBtn.disabled = true;
        logoutBtn.textContent = "Logging out…";
        try {
          await client.auth.signOut();
        } catch (e) {}
        goIndex();
      });
    }

    async function boot() {
      const hint = $("hintBox");
      const err = $("errBox");
      const mediaBox = $("mediaBox");
      const captionEl = $("caption");
      const likeBtn = $("likeBtn");
      const likeIcon = $("likeIcon");
      const likeCount = $("likeCount");
      const backBtn = $("backBtn");

      try {
        const client = getClient();

        const { data: sessData } = await client.auth.getSession();
        const session = sessData?.session;
        if (!session) {
          goIndex();
          return;
        }

        if (backBtn) backBtn.href = OP_PATHS.app.feed;

        setupLogout(client);
        await hydrateNav(client);
        await hydrateUserPill(client);

        const userId = session.user.id;
        const postId = getPostId();

        if (!postId) {
          hint.textContent = "";
          show(err, true);
          err.textContent = "Missing ?id= in URL";
          return;
        }

        async function fetchPost() {
          const { data, error } = await client
            .from("posts")
            .select("id, creator_id, title, content, preview, media_url, media_type, likes_count, created_at")
            .eq("id", postId)
            .maybeSingle();

          if (error) throw error;
          return data;
        }

        let post = await fetchPost();

        if (!post) {
          hint.textContent = "";
          show(err, true);
          err.textContent = "Post not found";
          return;
        }

        $("pageTitle").textContent = (post.title && post.title.trim()) ? post.title : "Post";
        $("createdAt").textContent = fmtDate(post.created_at);

        let authorName = "@creator";
        try {
          const { data: prof } = await client
            .from("profiles")
            .select("username")
            .eq("user_id", post.creator_id)
            .maybeSingle();

          if (prof?.username) authorName = "@" + prof.username;
        } catch (e) {}

        $("author").textContent = authorName;

        const bodyText = (post.content && String(post.content).trim().length)
          ? post.content
          : (post.preview || "");

        if (bodyText && String(bodyText).trim().length) {
          show(captionEl, true);
          captionEl.textContent = bodyText;
        } else {
          show(captionEl, false);
        }

        function renderMedia(p) {
          mediaBox.innerHTML = "";
          const type = (p.media_type || "none").toLowerCase();
          const url = (p.media_url || "").trim();

          if (!url || type === "none") {
            show(mediaBox, false);
            return;
          }

          show(mediaBox, true);

          if (type === "video") {
            mediaBox.innerHTML = `<video controls playsinline preload="metadata" src="${esc(url)}"></video>`;
          } else {
            mediaBox.innerHTML = `<img src="${esc(url)}" alt="Post media" loading="lazy" decoding="async" referrerpolicy="no-referrer">`;
          }
        }

        renderMedia(post);

        async function refreshLikes() {
          try {
            const fresh = await fetchPost();
            if (fresh) post = fresh;
          } catch (e) {}

          likeCount.textContent = String(post.likes_count ?? 0);

          const { data: mine, error: mErr } = await client
            .from("post_likes")
            .select("id")
            .eq("post_id", postId)
            .eq("fan_id", userId)
            .maybeSingle();

          const liked = !!(mine && mine.id) && !mErr;
          likeBtn.setAttribute("data-liked", liked ? "true" : "false");
          likeIcon.textContent = liked ? "♥" : "♡";
        }

        async function toggleLike() {
          show(err, false);
          const liked = likeBtn.getAttribute("data-liked") === "true";
          likeBtn.disabled = true;

          try {
            if (liked) {
              const { error } = await client
                .from("post_likes")
                .delete()
                .eq("post_id", postId)
                .eq("fan_id", userId);

              if (error) throw error;
            } else {
              const { error } = await client
                .from("post_likes")
                .insert({ post_id: postId, fan_id: userId });

              if (error) throw error;
            }

            await refreshLikes();
          } catch (e) {
            show(err, true);
            err.textContent = "Like error: " + (e?.message || String(e));
          } finally {
            likeBtn.disabled = false;
          }
        }

        likeBtn.addEventListener("click", toggleLike);

        $("copyLinkBtn").addEventListener("click", async () => {
          try {
            await navigator.clipboard.writeText(window.location.href);
            $("copyLinkBtn").textContent = "Copied!";
            setTimeout(() => { $("copyLinkBtn").textContent = "Copy link"; }, 900);
          } catch (e) {
            $("copyLinkBtn").textContent = "Nope";
            setTimeout(() => { $("copyLinkBtn").textContent = "Copy link"; }, 900);
          }
        });

        await refreshLikes();
        hint.textContent = "";
      } catch (e) {
        $("hintBox").textContent = "";
        show($("errBox"), true);
        $("errBox").textContent = e?.message || String(e);
      }
    }

    window.addEventListener("DOMContentLoaded", async () => {
      await loadLayout();

      if (typeof initNav === "function") {
        await initNav();
      }

      try {
        const client = getClient();
        if (client?.auth?.onAuthStateChange) {
          client.auth.onAuthStateChange((event) => {
            if (event === "SIGNED_OUT") goIndex();
          });
        }
      } catch (e) {}

      await boot();
    });
  </script>
</body>
</html>
