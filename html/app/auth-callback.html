<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OnlyPaws — Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
</head>
<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/paths.js"></script>
  <script src="/js/onlypawsClient.js"></script>

  <script>
    async function bootstrapUser(roleFallback) {
      const { data: uData, error: uErr } = await onlypawsClient.auth.getUser();
      if (uErr) throw uErr;

      const user = uData?.user;
      if (!user) return;

      const uid = user.id;
      const now = new Date().toISOString();

      // profiles: create only if missing, do NOT overwrite existing role
      const { data: existingProfile, error: profileReadErr } = await onlypawsClient
        .from("profiles")
        .select("user_id, role")
        .eq("user_id", uid)
        .maybeSingle();

      if (profileReadErr) throw profileReadErr;

      if (!existingProfile) {
        const role = roleFallback || user?.user_metadata?.role || "fan";

        const { error: profileInsertErr } = await onlypawsClient
          .from("profiles")
          .insert({
            user_id: uid,
            role,
            updated_at: now
          });

        if (profileInsertErr) throw profileInsertErr;
      }

      // wallets: safe upsert
      const { error: walletErr } = await onlypawsClient
        .from("wallets")
        .upsert(
          { profile_id: uid },
          { onConflict: "profile_id" }
        );

      if (walletErr) throw walletErr;

      // entitlements: create if missing, otherwise only refresh updated_at
      const { data: existingEntitlement, error: entReadErr } = await onlypawsClient
        .from("entitlements")
        .select("user_id")
        .eq("user_id", uid)
        .maybeSingle();

      if (entReadErr) throw entReadErr;

      if (!existingEntitlement) {
        const role = roleFallback || user?.user_metadata?.role || "fan";

        const { error: entInsertErr } = await onlypawsClient
          .from("entitlements")
          .insert({
            user_id: uid,
            fan_membership: role === "fan",
            creator_plan: role === "creator",
            creator_membership: false,
            updated_at: now
          });

        if (entInsertErr) throw entInsertErr;
      } else {
        const { error: entUpdateErr } = await onlypawsClient
          .from("entitlements")
          .update({ updated_at: now })
          .eq("user_id", uid);

        if (entUpdateErr) throw entUpdateErr;
      }
    }

    (async () => {
      try {
        const { data: s, error: sErr } = await onlypawsClient.auth.getSession();
        if (sErr) throw sErr;

        if (s?.session) {
          const role = s.session.user?.user_metadata?.role || "fan";
          await bootstrapUser(role);
        }
      } catch (e) {
        console.warn("bootstrap skipped:", e);
      }

      const next = new URLSearchParams(window.location.search).get("next");
      window.location.href = next || OP_PATHS.app.profile;
    })();
  </script>
</body>
</html>
