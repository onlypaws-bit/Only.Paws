<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OnlyPaws — Auth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="pageShell">
    <div class="wrap">
      <div class="panel">
        <div class="pill">auth callback</div>
        <h1>Signing you in...</h1>
        <p class="sub">Please wait a moment while we prepare your account.</p>
        <div id="msg" class="hint" style="margin-top:16px;">Checking session...</div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/paths.js"></script>
  <script src="/js/supabase.js"></script>

  <script>
    const msg = document.getElementById("msg");

    function setMsg(text) {
      if (msg) msg.textContent = text || "";
    }

    async function ensureProfileWalletAndEntitlementsWithoutOverwrite(defaultRole) {
      const { data: uData, error: uErr } = await onlypawsClient.auth.getUser();
      if (uErr) throw uErr;

      const user = uData?.user;
      if (!user?.id) return;

      const uid = user.id;
      const now = new Date().toISOString();

      const existingProfileRes = await onlypawsClient
        .from("profiles")
        .select("user_id, role")
        .eq("user_id", uid)
        .maybeSingle();

      if (existingProfileRes.error) throw existingProfileRes.error;

      if (!existingProfileRes.data) {
        const insertProfileRes = await onlypawsClient
          .from("profiles")
          .insert({
            user_id: uid,
            role: defaultRole,
            updated_at: now
          })
          .select()
          .maybeSingle();

        if (insertProfileRes.error) throw insertProfileRes.error;
      } else {
        const updateProfileRes = await onlypawsClient
          .from("profiles")
          .update({ updated_at: now })
          .eq("user_id", uid)
          .select()
          .maybeSingle();

        if (updateProfileRes.error) throw updateProfileRes.error;
      }

      const walletRes = await onlypawsClient
        .from("wallets")
        .upsert({ profile_id: uid }, { onConflict: "profile_id" })
        .select()
        .maybeSingle();

      if (walletRes.error) throw walletRes.error;

      const existingEntitlementsRes = await onlypawsClient
        .from("entitlements")
        .select("user_id")
        .eq("user_id", uid)
        .maybeSingle();

      if (existingEntitlementsRes.error) throw existingEntitlementsRes.error;

      if (!existingEntitlementsRes.data) {
        const insertEntitlementsRes = await onlypawsClient
          .from("entitlements")
          .insert({
            user_id: uid,
            fan_membership: false,
            creator_plan: false,
            creator_membership: false,
            updated_at: now
          })
          .select()
          .maybeSingle();

        if (insertEntitlementsRes.error) throw insertEntitlementsRes.error;
      } else {
        const updateEntitlementsRes = await onlypawsClient
          .from("entitlements")
          .update({ updated_at: now })
          .eq("user_id", uid)
          .select()
          .maybeSingle();

        if (updateEntitlementsRes.error) throw updateEntitlementsRes.error;
      }
    }

    function getSafeNextPath() {
      const next = new URLSearchParams(window.location.search).get("next");

      if (!next) return OP_PATHS.app.profile;

      if (next === "profile") return OP_PATHS.app.profile;
      if (next === "feed") return OP_PATHS.app.feed;

      if (next.startsWith("/") && next.endsWith(".html")) {
        return next;
      }

      return OP_PATHS.app.profile;
    }

    (async () => {
      try {
        setMsg("Checking session...");

        const { data: s } = await onlypawsClient.auth.getSession();

        if (s?.session) {
          const role = s.session.user?.user_metadata?.role || "fan";
          setMsg("Preparing your account...");
          await ensureProfileWalletAndEntitlementsWithoutOverwrite(role);
        }
      } catch (e) {
        console.warn("bootstrap skipped:", e);
      }

      window.location.href = getSafeNextPath();
    })();
  </script>
</body>
</html>
