<!--
  =========================================================
  OnlyPaws
  File: /html/app/creators/create-post.html

  Purpose:
  Creator interface for publishing or editing posts.

  Features:
  - Requires authenticated creator
  - Checks active Creator Plan before allowing publishing
  - Supports FREE and PREMIUM posts
  - Optional media upload (image/video) to Supabase Storage
  - Handles both CREATE and EDIT modes
  - Locked UI if creator plan is missing

  Dependencies:
  JS
  /js/paths.js
  /js/onlypawsClient.js
  /js/partials.js
  /js/nav.js
  /js/auth-guard.js

  CSS
  /css/styles.css

  Supabase:
  - posts table
  - profiles table
  - entitlements table
  - storage bucket: "posts"
  =========================================================
-->




<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OnlyPaws — Create Post</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/css/styles.css" />

  <style>
    .op-hidden {
      display: none !important;
    }

    .op-sectionSpace {
      margin-top: 8px;
    }

    .op-btnRowTop {
      margin-top: 12px;
    }

    .op-helpText {
      margin-top: 8px;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div id="header-placeholder"></div>

    <div class="panel">
      <div class="row">
        <div>
          <div class="pill op-sectionSpace op-hidden" id="modePill">Create Post</div>
          <h1 id="pageTitle">Create a post</h1>
          <p class="sub" id="pageSub">Creator-only. This writes into <b>posts</b>.</p>
        </div>
      </div>

      <div class="locked op-hidden" id="creatorLockBox">
        <b>🔒 Creator tools locked</b>

        <div class="btnRow op-btnRowTop">
          <a class="btn" id="unlockBtn" href="#" target="_blank" rel="noopener">
            Unlock Creator Access — €10/month
          </a>
          <button class="ghost" id="refreshBtn" type="button">Refresh</button>
        </div>

        <div class="op-helpText">After checkout, tap Refresh.</div>
      </div>

      <div class="field">
        <label for="is_public">Visibility</label>
        <select id="is_public">
          <option value="true">Public (shows in feeds)</option>
          <option value="false">Private (creator only)</option>
        </select>
      </div>

      <div class="field">
        <label for="is_paid">Type</label>
        <select id="is_paid">
          <option value="false">🆓 FREE</option>
          <option value="true">🔒 PREMIUM</option>
        </select>
      </div>

      <div class="field">
        <label for="title">Title</label>
        <input id="title" placeholder="e.g. Lola doing chaos stuff 🐾" />
      </div>

      <div class="field">
        <label for="content">Content</label>
        <textarea id="content" placeholder="Write the post content…"></textarea>
      </div>

      <div class="field">
        <label for="preview">Preview (recommended for PREMIUM)</label>
        <textarea id="preview" placeholder="Short teaser shown when locked…"></textarea>
      </div>

      <div class="field">
        <label for="mediaFile">Media (optional)</label>
        <input id="mediaFile" type="file" accept="image/*,video/*" />
      </div>

      <div class="btnRow">
        <button class="btn" id="publishBtn" type="button">Publish</button>
        <a class="ghost op-hidden" id="cancelEditBtn" href="#">Cancel</a>
      </div>

      <div class="msg" id="msg"></div>
    </div>

    <div id="footer-placeholder"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/paths.js"></script>
  <script src="/js/onlypawsClient.js"></script>
  <script src="/js/partials.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/auth-guard.js"></script>

  <script>
    const CREATOR_PLAN_URL = "https://buy.stripe.com/5kQbJ25UY5qegpM4kD5wI02";

    const BUCKET = "posts";
    const BUCKET_IS_PUBLIC = true;
    const MAX_MB = 25;

    const msg = document.getElementById("msg");
    const publishBtn = document.getElementById("publishBtn");

    const creatorLockBox = document.getElementById("creatorLockBox");
    const unlockBtn = document.getElementById("unlockBtn");
    const refreshBtn = document.getElementById("refreshBtn");

    const modePill = document.getElementById("modePill");
    const pageTitle = document.getElementById("pageTitle");
    const pageSub = document.getElementById("pageSub");
    const cancelEditBtn = document.getElementById("cancelEditBtn");

    unlockBtn.href = CREATOR_PLAN_URL;
    cancelEditBtn.href = OP_PATHS.app.creators.creatorDash;

    let user = null;
    let profile = null;
    let creatorPlanActive = false;
    let editingPost = null;

    const params = new URLSearchParams(window.location.search);
    const editId = params.get("edit");

    function setMsg(text) {
      msg.textContent = text || "";
    }

    function setHidden(el, hidden) {
      if (!el) return;
      el.classList.toggle("op-hidden", hidden);
    }

    function detectMediaType(file) {
      if (!file) return "none";
      if (file.type && file.type.startsWith("image/")) return "image";
      if (file.type && file.type.startsWith("video/")) return "video";
      return "none";
    }

    function safeFileName(name) {
      return (name || "file").replace(/[^\w.\-]+/g, "_");
    }

    function setToolsEnabled(enabled) {
      document.getElementById("is_public").disabled = !enabled;
      document.getElementById("is_paid").disabled = !enabled;
      document.getElementById("title").disabled = !enabled;
      document.getElementById("content").disabled = !enabled;
      document.getElementById("preview").disabled = !enabled;
      document.getElementById("mediaFile").disabled = !enabled;
      publishBtn.disabled = !enabled;
    }

    async function getSessionOrRedirect() {
      const session = await OPAuth.getSession();

      if (!session) {
        window.location.href = OP_PATHS.marketing.fans;
        return null;
      }

      return session;
    }

    async function requireCreatorAndPlan() {
      const session = await getSessionOrRedirect();
      if (!session) return false;

      user = session.user;
      profile = await OPAuth.getProfile(user.id);

      if (!profile || profile.role !== "creator") {
        window.location.href = OP_PATHS.marketing.home;
        return false;
      }

      creatorPlanActive = await OPAuth.isCreatorPlanActive(user.id);

      if (!creatorPlanActive) {
        setHidden(creatorLockBox, false);
        setToolsEnabled(false);
        setMsg("Creator Plan required to publish posts.");
        return false;
      }

      setHidden(creatorLockBox, true);
      setToolsEnabled(true);
      setMsg("");
      return true;
    }

    async function uploadMedia(postId) {
      const file = document.getElementById("mediaFile").files?.[0] || null;
      if (!file) return { media_url: null, media_type: "none" };

      const media_type = detectMediaType(file);
      if (media_type === "none") {
        throw new Error("Unsupported file type. Use image/video only.");
      }

      const sizeMb = file.size / (1024 * 1024);
      if (sizeMb > MAX_MB) {
        throw new Error(`File too large (${sizeMb.toFixed(1)}MB). Max ${MAX_MB}MB.`);
      }

      const path = `uploads/${user.id}/${postId}/${Date.now()}_${safeFileName(file.name)}`;

      const { error: upErr } = await onlypawsClient.storage
        .from(BUCKET)
        .upload(path, file, {
          upsert: false,
          contentType: file.type || undefined
        });

      if (upErr) {
        const message = (upErr.message || "").toLowerCase();

        if (message.includes("bucket") && message.includes("not found")) {
          throw new Error(`Bucket "${BUCKET}" not found. Create it in Supabase Storage → Buckets.`);
        }

        throw upErr;
      }

      let media_url = null;

      if (BUCKET_IS_PUBLIC) {
        const { data } = onlypawsClient.storage.from(BUCKET).getPublicUrl(path);
        media_url = data?.publicUrl || null;
      } else {
        media_url = path;
      }

      return { media_url, media_type };
    }

    function setEditModeUI() {
      setHidden(modePill, false);
      modePill.textContent = "Edit Post";

      document.title = "OnlyPaws — Edit Post";
      pageTitle.textContent = "Edit post";
      pageSub.innerHTML = `Update your post. Changes save into <b>posts</b>.`;
      publishBtn.textContent = "Save changes";

      setHidden(cancelEditBtn, false);
    }

    async function loadPostForEdit(postId) {
      setMsg("Loading post…");
      setEditModeUI();

      const { data, error } = await onlypawsClient
        .from("posts")
        .select("id, title, content, preview, is_paid, is_public, media_url, media_type, creator_id")
        .eq("id", postId)
        .maybeSingle();

      if (error) throw error;
      if (!data) throw new Error("Post not found.");

      if (data.creator_id !== user.id) {
        throw new Error("Not allowed: this post is not yours.");
      }

      editingPost = data;

      document.getElementById("title").value = data.title || "";
      document.getElementById("content").value = data.content || "";
      document.getElementById("preview").value = data.preview || "";
      document.getElementById("is_paid").value = data.is_paid ? "true" : "false";
      document.getElementById("is_public").value = data.is_public === false ? "false" : "true";

      setMsg("Loaded ✅");
    }

    function resetForm() {
      document.getElementById("title").value = "";
      document.getElementById("content").value = "";
      document.getElementById("preview").value = "";
      document.getElementById("mediaFile").value = "";
      document.getElementById("is_paid").value = "false";
      document.getElementById("is_public").value = "true";
    }

    async function publishOrUpdate() {
      setMsg(editId ? "Saving…" : "Publishing…");
      publishBtn.disabled = true;

      try {
        if (!user || !profile || profile.role !== "creator") {
          throw new Error("Not allowed.");
        }

        if (!creatorPlanActive) {
          throw new Error("Creator Plan required.");
        }

        const title = (document.getElementById("title").value || "").trim();
        const content = (document.getElementById("content").value || "").trim();
        const preview = (document.getElementById("preview").value || "").trim();

        const is_paid = document.getElementById("is_paid").value === "true";
        const is_public = document.getElementById("is_public").value === "true";

        if (!title) throw new Error("Title is required.");
        if (!content) throw new Error("Content is required.");

        const creator_id = user.id;

        if (editId) {
          if (!editingPost) {
            throw new Error("Edit mode not ready.");
          }

          const { error: updateErr } = await onlypawsClient
            .from("posts")
            .update({
              title,
              content,
              preview: preview || null,
              is_paid,
              is_public,
              creator_id
            })
            .eq("id", editId)
            .eq("creator_id", user.id);

          if (updateErr) throw updateErr;

          const hasFile = !!document.getElementById("mediaFile").files?.[0];

          if (hasFile) {
            setMsg("Uploading media…");

            const { media_url, media_type } = await uploadMedia(editId);

            if (media_url) {
              const { error: mediaErr } = await onlypawsClient
                .from("posts")
                .update({ media_url, media_type })
                .eq("id", editId)
                .eq("creator_id", user.id);

              if (mediaErr) throw mediaErr;
            }
          }

          setMsg("Saved ✅");
          document.getElementById("mediaFile").value = "";
          return;
        }

        const { data: inserted, error: insertErr } = await onlypawsClient
          .from("posts")
          .insert([{
            creator_id,
            title,
            content,
            preview: preview || null,
            is_paid,
            is_public,
            media_type: "none",
            media_url: null
          }])
          .select("id")
          .single();

        if (insertErr) throw insertErr;

        const postId = inserted.id;
        const hasFile = !!document.getElementById("mediaFile").files?.[0];

        if (hasFile) {
          setMsg("Uploading media…");

          const { media_url, media_type } = await uploadMedia(postId);

          if (media_url) {
            const { error: mediaErr } = await onlypawsClient
              .from("posts")
              .update({ media_url, media_type })
              .eq("id", postId)
              .eq("creator_id", user.id);

            if (mediaErr) throw mediaErr;
          }
        }

        setMsg("Published ✅");
        resetForm();
      } catch (error) {
        console.warn(error);
        setMsg(error.message || String(error));
      } finally {
        publishBtn.disabled = false;
      }
    }

    window.addEventListener("DOMContentLoaded", async () => {
      await loadLayout();
      await initNav();

      publishBtn.addEventListener("click", publishOrUpdate);
      refreshBtn.addEventListener("click", () => window.location.reload());

      const navLogout = document.getElementById("navLogout");
      if (navLogout) {
        navLogout.addEventListener("click", async () => {
          await onlypawsClient.auth.signOut();
          window.location.href = OP_PATHS.marketing.home;
        });
      }

      const ok = await requireCreatorAndPlan();
      if (!ok) return;

      if (editId) {
        try {
          await loadPostForEdit(editId);
        } catch (error) {
          setMsg(error.message || String(error));
          setToolsEnabled(false);
        }
      }
    });
  </script>
</body>
</html>
