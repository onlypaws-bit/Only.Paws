<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OnlyPaws — Choose your plan</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="../../css/styles.css" />

  <style>
    .wrap{
      max-width:1100px;
      margin:0 auto;
      padding:28px 18px 24px;
      width:100%;
      flex:1;
    }

    .nav{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin-bottom:18px;
      position:sticky;
      top:0;
      padding:10px 0;
      backdrop-filter: blur(10px);
      z-index:10;
    }

    .planPanel{
      border-radius:22px;
      padding:22px;
      background:var(--card);
      border:1px solid var(--stroke);
      backdrop-filter: blur(10px);
      box-shadow:0 20px 45px var(--shadow);
    }

    .planTitle{
      text-align:center;
      margin:8px 0 10px;
      font-size:clamp(1.8rem,4vw,2.4rem);
      letter-spacing:-.3px;
    }

    .subline{
      text-align:center;
      margin:0 0 18px;
      color:var(--muted);
      font-weight:800;
      font-size:13px;
    }

    .plans{
      display:grid;
      grid-template-columns:1fr;
      gap:14px;
      max-width:520px;
      margin:0 auto;
    }

    .plan{
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18);
      border-radius:22px;
      padding:22px;
      padding-top:64px;
      display:flex;
      flex-direction:column;
      gap:14px;
      position:relative;
      transition:transform .16s ease, background .16s ease, border-color .16s ease, box-shadow .16s ease;
      will-change:transform;
      min-height:420px;
      overflow:visible;
    }

    .plan:hover{
      transform:translateY(-2px) scale(1.01);
      background:rgba(255,255,255,.12);
      border-color:rgba(255,255,255,.24);
      box-shadow:0 26px 55px rgba(0,0,0,.28);
    }

    .plan:active{
      transform:translateY(0px) scale(.995);
    }

    .plan.featured{
      background:linear-gradient(180deg, rgba(107,78,255,.90), rgba(139,108,255,.90));
    }

    .plan.featured:hover{
      transform:translateY(-3px) scale(1.015);
      box-shadow:0 30px 65px rgba(0,0,0,.30);
    }

    .planIcon{
      position:absolute;
      top:-42px;
      left:50%;
      transform:translateX(-50%);
      width:84px;
      height:auto;
      pointer-events:none;
      filter:drop-shadow(0 10px 20px rgba(0,0,0,.35));
      will-change:transform;
    }

    @keyframes pawFloat{
      0%   { transform:translateX(-50%) translateY(0px) rotate(-0.6deg); }
      50%  { transform:translateX(-50%) translateY(-6px) rotate(0.6deg); }
      100% { transform:translateX(-50%) translateY(0px) rotate(-0.6deg); }
    }

    .plan:hover .planIcon{
      animation:pawFloat 1.25s ease-in-out infinite;
    }

    .plan:active .planIcon{
      animation:none;
      transform:translateX(-50%) translateY(-2px);
    }

    .plan h2{
      margin:0;
      font-size:1.55rem;
    }

    .tag{
      font-weight:900;
      color:var(--muted);
    }

    .desc{
      color:rgba(255,255,255,.9);
      line-height:1.5;
      margin:0;
    }

    .planList{
      padding-left:18px;
      margin:0;
      color:rgba(255,255,255,.92);
    }

    .planList li{
      margin-bottom:6px;
    }

    .price{
      font-size:2rem;
      font-weight:900;
    }

    .micro{
      margin-top:-6px;
      color:rgba(255,255,255,.85);
      font-size:12px;
      font-weight:800;
    }

    .subscribeBtn{
      margin-top:auto;
    }

    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      background:rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.18);
      backdrop-filter:blur(10px);
      color:#fff;
      padding:10px 14px;
      border-radius:14px;
      font-size:13px;
      font-weight:800;
      box-shadow:0 20px 45px rgba(0,0,0,.25);
      display:none;
      max-width:min(520px,92vw);
      text-align:center;
      z-index:100;
    }

    .toast.show{
      display:block;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="nav">
      <a href="../app/feed.html" class="brand">
        <div class="brandLogo">
          <img src="../../assets/images/logo.png" alt="OnlyPaws logo">
        </div>
        <span class="brandText">OnlyPaws</span>
      </a>

      <div class="navRight">
        <a class="navBtn" href="../app/feed.html">Feed</a>
        <a class="navBtn primary" href="../app/profile.html">Profile</a>
        <button class="navBtn" id="logoutBtn" type="button">Log out</button>
      </div>
    </div>

    <div class="planPanel">
      <h1 class="planTitle">Choose your plan 🐾</h1>
      <div class="subline" id="subline">Loading…</div>

      <div class="plans" id="plans">
        <div class="plan featured" id="vipPlan">
          <img class="planIcon" src="../../assets/images/paw-crown.png" alt="VIPaws">
          <h2 id="planName">VIPaws</h2>
          <div class="tag" id="planTag">best value 🐾</div>
          <p class="desc" id="planDesc">Extra content, more interaction, real influence 🐶✨</p>
          <ul class="planList">
            <li>exclusive monthly content</li>
            <li>bloopers &amp; polls</li>
            <li>monthly Q&amp;A</li>
          </ul>
          <div class="price" id="planPrice">€5 / month</div>
          <div class="micro" id="planMicro">best value 🐾</div>
          <button class="btn subscribeBtn" id="subscribeBtn" type="button">Subscribe</button>
        </div>
      </div>
    </div>

    <div id="footer-placeholder"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../../js/supabase.js"></script>
  <script src="../../js/partials.js"></script>

  <script>
    function supa() {
      return window.onlypawsClient || (typeof onlypawsClient !== "undefined" ? onlypawsClient : null);
    }

    function goIndex() {
      window.location.replace("../marketing/index.html");
    }

    const CREATOR_ID = new URLSearchParams(location.search).get("creator");

    const subline = document.getElementById("subline");
    const toastEl = document.getElementById("toast");
    const logoutBtn = document.getElementById("logoutBtn");
    const subscribeBtn = document.getElementById("subscribeBtn");

    const planNameEl = document.getElementById("planName");
    const planDescEl = document.getElementById("planDesc");
    const planPriceEl = document.getElementById("planPrice");

    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("show");
      clearTimeout(toastEl._t);
      toastEl._t = setTimeout(() => toastEl.classList.remove("show"), 2600);
    }

    function setButtonBusy(isBusy, txt) {
      subscribeBtn.disabled = !!isBusy;
      if (txt) subscribeBtn.textContent = txt;
    }

    function shortId(id) {
      if (!id) return "";
      return id.slice(0, 6) + "…" + id.slice(-4);
    }

    async function getCreatorLabel() {
      const c = supa();
      const { data, error } = await c
        .from("profiles")
        .select("username, display_name")
        .eq("user_id", CREATOR_ID)
        .maybeSingle();

      if (error) return null;
      return data?.display_name || data?.username || null;
    }

    async function loadVipPlan() {
      const c = supa();

      const { data, error } = await c
        .from("creator_plans")
        .select("id, name, description, price_cents, currency, billing_period, is_active, created_at")
        .eq("creator_id", CREATOR_ID)
        .eq("is_active", true)
        .eq("billing_period", "monthly")
        .order("created_at", { ascending: false })
        .limit(1)
        .maybeSingle();

      if (error) throw error;
      return data || null;
    }

    async function createFanCheckout({ creator_id }) {
      const c = supa();
      const { data: { session } } = await c.auth.getSession();

      if (!session) {
        toast("Please login first");
        setTimeout(goIndex, 700);
        return;
      }

      const successUrl = new URL(`${location.origin}/html/creators/creator-profile.html`);
      successUrl.searchParams.set("u", creator_id);
      successUrl.searchParams.set("success", "1");

      const cancelUrl = new URL(location.href);

      const { data, error } = await c.functions.invoke("create-fan-subscription", {
        body: {
          creator_id,
          success_url: successUrl.toString(),
          cancel_url: cancelUrl.toString()
        },
        headers: { Authorization: `Bearer ${session.access_token}` },
      });

      if (error) throw error;

      const action = (data?.action || "").toString();
      const url = data?.url || data?.checkout_url || data?.sessionUrl;

      if (action === "resumed") {
        toast("Subscription resumed ✅");
        return { action: "resumed" };
      }

      if (!url) throw new Error("Missing checkout url");

      window.open(url, "_blank", "noopener,noreferrer");
      return { action: "checkout" };
    }

    async function boot() {
      const c = supa();

      if (!c || !c.auth) {
        setButtonBusy(true, "Subscribe");
        subline.textContent = "—";
        toast("Config error");
        return;
      }

      if (!CREATOR_ID) {
        setButtonBusy(true, "Subscribe");
        subline.textContent = "—";
        toast("Missing creator");
        return;
      }

      logoutBtn.addEventListener("click", async () => {
        logoutBtn.disabled = true;
        logoutBtn.textContent = "Logging out…";
        try { await c.auth.signOut(); } catch (e) {}
        goIndex();
      });

      const { data: { session } } = await c.auth.getSession();
      if (!session) {
        toast("Please login first");
        subline.textContent = "Please login to subscribe";
        subscribeBtn.addEventListener("click", () => goIndex());
        return;
      }

      const label = await getCreatorLabel();
      subline.textContent = label ? `Creator: @${label}` : `Creator: ${shortId(CREATOR_ID)}`;

      let plan = null;
      try {
        plan = await loadVipPlan();
      } catch (e) {
        console.error(e);
        toast(e?.message || String(e));
      }

      if (!plan) {
        setButtonBusy(true, "Unavailable");
        toast("Creator has no active plan yet");
        return;
      }

      if (plan.name) planNameEl.textContent = plan.name;
      if (plan.description) planDescEl.textContent = plan.description;

      const cents = Number.isFinite(plan.price_cents) ? plan.price_cents : 500;
      const euro = (cents / 100).toFixed(2).replace(".00", "");
      planPriceEl.textContent = `€${euro} / month`;

      subscribeBtn.addEventListener("click", async () => {
        try {
          setButtonBusy(true, "Opening checkout…");
          await createFanCheckout({ creator_id: CREATOR_ID });
          setButtonBusy(false, "Subscribe");
        } catch (e) {
          console.error(e);
          toast(e?.message || String(e));
          setButtonBusy(false, "Subscribe");
        }
      });

      setButtonBusy(false, "Subscribe");
    }

    window.addEventListener("DOMContentLoaded", async () => {
      await loadLayout();

      const c = supa();
      if (c?.auth) {
        c.auth.onAuthStateChange((event) => {
          if (event === "SIGNED_OUT") goIndex();
        });
      }

      await boot();
    });
  </script>
</body>
</html>
