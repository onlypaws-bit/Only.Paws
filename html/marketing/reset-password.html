<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OnlyPaws — Reset Password</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="stylesheet" href="/css/pages/marketing-status.css" />
  <link rel="stylesheet" href="/css/pages/marketing-reset-password.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/js/supabase.js"></script>
  <script src="/js/paths.js"></script>
  <script src="/js/partials.js"></script>
</head>

<body>
  <div class="pageShell">
    <div class="wrap">
      <div class="statusLayout">
        <div class="panel statusCard">
          <div class="statusIcon">🔐</div>

          <h1 class="statusTitle">Reset your password</h1>

          <p class="statusText">
            Enter a new password for your account.
          </p>

          <div class="resetHint" id="hint"></div>

          <div class="resetForm">
            <div class="resetFieldGroup">
              <input
                id="newPass"
                class="resetField"
                type="password"
                placeholder="New password (min 6 chars)"
                autocomplete="new-password"
              />

              <input
                id="newPass2"
                class="resetField"
                type="password"
                placeholder="Repeat new password"
                autocomplete="new-password"
              />
            </div>

            <div class="btnRow resetActions">
              <button class="btn" id="saveBtn" type="button">Update password</button>
              <a class="ghost" id="backToLoginLink" href="/html/marketing/index.html">Back to login</a>
            </div>

            <div class="resetMsg authMsg" id="msg"></div>
            <div class="resetHintText resetHint resetHintStatic" hidden></div>
            <div class="resetTiny">
              If this link is expired, go back and request a new reset email.
            </div>
          </div>
        </div>
      </div>

      <div class="footerWrap" id="footer-placeholder"></div>
    </div>
  </div>

  <script>
    const msg = document.getElementById("msg");
    const hint = document.getElementById("hint");
    const saveBtn = document.getElementById("saveBtn");
    const newPassEl = document.getElementById("newPass");
    const newPass2El = document.getElementById("newPass2");
    const backToLoginLink = document.getElementById("backToLoginLink");

    function applyResetPasswordPaths() {
      if (backToLoginLink) {
        backToLoginLink.href = OP_PATHS.marketing.index;
      }
    }

    function setMsg(text) {
      msg.textContent = text || "";
    }

    function setHint(text) {
      hint.style.display = text ? "block" : "none";
      hint.textContent = text || "";
    }

    function setBusy(isBusy) {
      saveBtn.disabled = isBusy;
      newPassEl.disabled = isBusy;
      newPass2El.disabled = isBusy;
    }

    function hasRecoveryHash() {
      return typeof window.location.hash === "string" &&
        window.location.hash.includes("access_token=");
    }

    async function ensureRecoverySession() {
      if (typeof onlypawsClient === "undefined") {
        setMsg("❌ onlypawsClient not found. Check supabase.js path + script order.");
        return false;
      }

      const { data } = await onlypawsClient.auth.getSession();
      if (data?.session) return true;

      await new Promise(resolve => setTimeout(resolve, 500));

      const { data: data2 } = await onlypawsClient.auth.getSession();
      if (data2?.session) return true;

      return false;
    }

    window.addEventListener("DOMContentLoaded", async () => {
      applyResetPasswordPaths();

      try {
        await loadMarketingLayout();
      } catch (e) {
        console.warn("marketing footer/header load skipped:", e);
      }

      setBusy(true);

      try {
        if (!hasRecoveryHash()) {
          setHint("Tip: open this page from the reset email link. It contains a recovery token in the URL.");
        } else {
          setHint("Looks like a valid reset link. You can set a new password now.");
        }

        if (typeof onlypawsClient !== "undefined") {
          onlypawsClient.auth.onAuthStateChange((event) => {
            if (
              event === "SIGNED_IN" ||
              event === "INITIAL_SESSION" ||
              event === "PASSWORD_RECOVERY"
            ) {
              try {
                if (window.location.hash) {
                  history.replaceState(
                    null,
                    document.title,
                    window.location.pathname + window.location.search
                  );
                }
              } catch (e) {
                console.warn("hash cleanup skipped:", e);
              }
            }
          });
        }

        const ok = await ensureRecoverySession();

        if (!ok) {
          setMsg("⚠️ Invalid or expired reset link.\nGo back and request a new one.");
        } else {
          setMsg("");
        }
      } finally {
        setBusy(false);
      }
    });

    saveBtn.addEventListener("click", async () => {
      const p1 = newPassEl.value || "";
      const p2 = newPass2El.value || "";

      if (p1.length < 6) {
        setMsg("Password must be at least 6 characters.");
        return;
      }

      if (p1 !== p2) {
        setMsg("Passwords do not match.");
        return;
      }

      setBusy(true);

      try {
        setMsg("Checking link...");
        const ok = await ensureRecoverySession();

        if (!ok) {
          setMsg("⚠️ Invalid or expired reset link.\nPlease request a new reset email.");
          return;
        }

        setMsg("Updating password...");

        const { error } = await onlypawsClient.auth.updateUser({ password: p1 });

        if (error) {
          setMsg("❌ " + error.message);
          return;
        }

        setMsg("✅ Password updated! Redirecting...");

        setTimeout(() => {
          window.location.href = OP_PATHS.app.profile;
        }, 900);
      } finally {
        setBusy(false);
      }
    });
  </script>
</body>
</html>
